<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Benchmark</title>
    <link rel="icon" type="image/png" href="../icons/baddy.png">
    <link rel="stylesheet" href="login.css?v=20260224-mobilefix3">
</head>
<body>
    <h1 class="app-title">Benchmark</h1>
    <div class="auth-main">
    <div class="login-container">
                <select id="authLanguageSelect" class="auth-lang-select">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="pt-BR">Português (Brasil)</option>
        </select>
        <h2 data-auth-i18n="login_heading">Login</h2>
        <div class="input-group">
            <label for="email" data-auth-i18n="label_email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group">
            <label for="password" data-auth-i18n="label_password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px;">
            <input type="checkbox" id="rememberMe" style="width: auto;">
            <label for="rememberMe" style="margin: 0; cursor: pointer;" data-auth-i18n="label_remember_me">Remember me</label>
        </div>
        <button id="loginBtn" class="btn btn-primary" data-auth-i18n="btn_login">Login</button>
        <div class="alternative-actions">
            <a href="forgot-password" id="forgotPasswordLink" data-auth-i18n="link_forgot_password">Forgot Password?</a>
            <span>|</span>
            <a href="sign-up" id="signUpLink" data-auth-i18n="link_sign_up">Sign Up</a>
        </div>
        <p id="error-message" class="error-message"></p>
    </div>
    <div class="auth-lang-shell">
        <div class="auth-lang-dropdown" id="authLangDropdown">
            <button type="button" class="auth-lang-button" id="authLangButton" aria-expanded="false">Language</button>
            <div class="auth-lang-menu" id="authLangMenu"></div>
        </div>
    </div>
    </div>
    <footer class="legal-footer auth-footer">
        <div class="benchmark-footer-inner">
            <div class="legal-footer-icon-wrap">
                <img class="legal-baddy-icon" src="../icons/baddy.png" alt="Baddy icon">
            </div>
            <div class="legal-footer-text"><span data-auth-i18n="footer_site_made_by">Site made by</span> <span class="legal-author">Rustum</span>.</div>
            <div class="legal-footer-disclaimer" data-auth-i18n="footer_disclaimer">This site is not affiliated, maintained, endorsed or sponsored by GraalOnline, All assets &copy; 2026 GraalOnline</div>
            <div class="legal-footer-links">
                <a href="../terms-and-condition/index.html?from=benchmark&returnTo=login" target="_blank" rel="noopener noreferrer" data-auth-i18n="footer_terms">Terms &amp; Conditions</a>
                <span class="legal-divider">|</span>
                <a href="../privacy-policy/index.html?from=benchmark&returnTo=login" target="_blank" rel="noopener noreferrer" data-auth-i18n="footer_privacy">Privacy Policy</a>
                <span class="legal-divider">|</span>
                <a href="../cookie-policy/index.html?from=benchmark&returnTo=login" target="_blank" rel="noopener noreferrer" data-auth-i18n="footer_cookie">Cookie Policy</a>
                <span class="legal-divider">|</span>
                <a href="../dmca-copyright-policy/index.html?from=benchmark&returnTo=login" target="_blank" rel="noopener noreferrer" data-auth-i18n="footer_dmca">DMCA Policy</a>
            </div>
        </div>
    </footer>

    <script src="auth-i18n.js?v=20260223a4"></script>
    <script src="footer-baddy.js?v=20260221b4"></script>
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, setPersistence, browserSessionPersistence, browserLocalPersistence, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAiZHVFIXe8LrxGS-TklX-pIqC135IpIbY",
        authDomain: "benchmark-5a89f.firebaseapp.com",
        projectId: "benchmark-5a89f",
        storageBucket: "benchmark-5a89f.appspot.com",
        messagingSenderId: "1001899133728",
        appId: "1:1001899133728:web:73b7dc8f8814533020e545",
        measurementId: "G-CCRXR4PKK2"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const getBenchmarkBasePath = () => {
          const pathname = window.location.pathname || '';
          const lower = pathname.toLowerCase();
          const marker = '/benchmark';
          const markerIndex = lower.indexOf(marker);
          if (markerIndex >= 0) return pathname.slice(0, markerIndex + marker.length) || '/benchmark';
          const fallback = pathname.replace(/\/[^/]*$/, '');
          return fallback || '/benchmark';
      };

      const normalizeLoginPath = () => {
          const lowerPath = (window.location.pathname || '').toLowerCase();
          if (lowerPath.endsWith('/login.html') || lowerPath.endsWith('/benchmark/index.html')) {
              window.history.replaceState({}, '', `${getBenchmarkBasePath()}/`);
          }
      };
      normalizeLoginPath();
      const slugifyProfileSegment = (value) => {
          const raw = (value || '').toString().trim().toLowerCase();
          const slug = raw
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '');
          return slug || 'player';
      };
      const getAccountIdTail = (accountId) => {
          const clean = (accountId || '')
              .toString()
              .trim()
              .replace(/[^a-zA-Z0-9]/g, '');
          if (!clean) return '0000';
          return clean.slice(-4).toLowerCase();
      };
      const isLocalDevRoutingEnv = () => {
          const host = (window.location.hostname || '').toLowerCase();
          if (window.location.protocol === 'file:') return true;
          if (host === 'localhost' || host === '127.0.0.1' || host === '::1' || host === '0.0.0.0') return true;
          if (host.endsWith('.local') || host.endsWith('.lan')) return true;
          const privateV4 = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/;
          if (privateV4.test(host)) return true;
          return false;
      };
      const resolveSignedInUrl = async (user) => {
          if (!user) return `${getBenchmarkBasePath()}/`;
          let username = user.displayName || 'player';
          let accountId = '';
          let publicSlug = '';
          try {
              const userDoc = await getDoc(doc(db, 'users', user.uid));
              if (userDoc.exists()) {
                  const data = userDoc.data() || {};
                  const profile = (data.profile && typeof data.profile === 'object') ? data.profile : {};
                  username = data.username || profile.username || username;
                  accountId = data.accountId || accountId;
                  publicSlug = (data.publicSlug || '').toString().trim();
                  
              }
          } catch (e) {
              console.warn('Failed to resolve signed-in profile URL, using fallback.', e);
          }
          const slug = publicSlug || `${slugifyProfileSegment(username)}-${getAccountIdTail(accountId)}`;
          if (isLocalDevRoutingEnv()) {
              return `${getBenchmarkBasePath()}/benchmark.html`;
          }
          const restoreTarget = `${getBenchmarkBasePath()}/${slug}`;
          return `${getBenchmarkBasePath()}/benchmark.html?__restore=${encodeURIComponent(restoreTarget)}`;
      };
      const getCurrentPathWithSearch = () => `${window.location.pathname}${window.location.search}`;
      const REDIRECT_GUARD_FLAG_KEY = 'benchmark_disable_auto_nav';
      const REDIRECT_LOAD_GUARD_KEY = 'benchmark_auto_nav_load_guard';
      const shouldDisableAutoNav = () => {
          try {
              const params = new URLSearchParams(window.location.search || '');
              if (params.get('pause_nav') === '1') return true;
              return sessionStorage.getItem(REDIRECT_GUARD_FLAG_KEY) === '1';
          } catch (e) {
              return false;
          }
      };
      const registerAutoNavLoad = () => {
          try {
              const now = Date.now();
              const raw = sessionStorage.getItem(REDIRECT_LOAD_GUARD_KEY);
              let state = raw ? JSON.parse(raw) : { count: 0, ts: 0 };
              if (!state || typeof state !== 'object') state = { count: 0, ts: 0 };
              if (now - Number(state.ts || 0) <= 12000) {
                  state.count = Number(state.count || 0) + 1;
              } else {
                  state.count = 1;
              }
              state.ts = now;
              sessionStorage.setItem(REDIRECT_LOAD_GUARD_KEY, JSON.stringify(state));
              if (state.count >= 4) {
                  sessionStorage.setItem(REDIRECT_GUARD_FLAG_KEY, '1');
              }
          } catch (e) {
              // ignore guard storage errors
          }
      };
      registerAutoNavLoad();
      const isCanonicalLoginPath = (pathValue) => {
          const lower = (pathValue || '').toLowerCase();
          const base = getBenchmarkBasePath().toLowerCase();
          return (
              lower === base ||
              lower === `${base}/` ||
              lower === `${base}/index.html` ||
              lower === `${base}/login.html`
          );
      };
      const normalizePath = (path) => (path || '').replace(/\/+$/, '') || '/';
      const navigateAfterLogin = async (user) => {
          if (shouldDisableAutoNav()) return;
          const now = Date.now();
          const loopWindowMs = 15000;
          const loopCountKey = 'benchmark_login_redirect_count';
          const loopAtKey = 'benchmark_login_redirect_count_at';
          const prevAt = Number(sessionStorage.getItem(loopAtKey) || '0');
          const prevCount = Number(sessionStorage.getItem(loopCountKey) || '0');
          const count = (now - prevAt <= loopWindowMs) ? (prevCount + 1) : 1;
          sessionStorage.setItem(loopCountKey, String(count));
          sessionStorage.setItem(loopAtKey, String(now));
          if (count > 2) return;

          const target = await resolveSignedInUrl(user);
          const targetUrl = new URL(target, window.location.origin);
          const currentPathname = window.location.pathname || '';
          const currentPath = normalizePath(getCurrentPathWithSearch());
          const targetPath = normalizePath(`${targetUrl.pathname}${targetUrl.search}`);

          // If login HTML is being served on a slug/non-login path, force boot via benchmark.html.
          // This prevents auth redirect loops when hosting fallback serves the wrong document.
          if (!isCanonicalLoginPath(currentPathname)) {
              const directTargetPath = normalizePath(`${targetUrl.pathname}${targetUrl.search}`);
              if (currentPath !== directTargetPath) {
                  window.location.replace(targetUrl.toString());
              }
              return;
          }

          if (currentPath === targetPath) return;

          const redirectKey = 'benchmark_login_redirect_target';
          const redirectAtKey = 'benchmark_login_redirect_at';
          const lastTarget = sessionStorage.getItem(redirectKey) || '';
          const lastAt = Number(sessionStorage.getItem(redirectAtKey) || '0');
          if (lastTarget === targetPath && now - lastAt < 4000) return;
          sessionStorage.setItem(redirectKey, targetPath);
          sessionStorage.setItem(redirectAtKey, String(now));
          window.location.replace(targetUrl.toString());
      };

      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberMeCheckbox = document.getElementById('rememberMe');
      const loginBtn = document.getElementById('loginBtn');
      const forgotPasswordLink = document.getElementById('forgotPasswordLink');
      const signUpLink = document.getElementById('signUpLink');
      const errorMessage = document.getElementById('error-message');
      const tAuth = (key) => (window.authT ? window.authT(key) : key);

      const animatePress = (element) => {
          if (!element) return;
          element.classList.remove('is-clicking');
          void element.offsetWidth;
          element.classList.add('is-clicking');
          setTimeout(() => element.classList.remove('is-clicking'), 220);
      };

      const handleLogin = () => {
          const email = emailInput.value;
          const password = passwordInput.value;
          const rememberMe = rememberMeCheckbox.checked;
          errorMessage.textContent = '';

          if (!email || !password) {
              errorMessage.textContent = tAuth('err_login_missing');
              return;
          }

          const persistence = rememberMe ? browserLocalPersistence : browserSessionPersistence;

          setPersistence(auth, persistence)
              .then(() => signInWithEmailAndPassword(auth, email, password))
              .then(async (userCredential) => {
                  if (!userCredential.user.emailVerified) {
                      signOut(auth);
                      errorMessage.textContent = tAuth('err_login_verify');
                      return;
                  }

                  const savedLang = localStorage.getItem('benchmark_language') || 'en';
                  setDoc(doc(db, 'users', userCredential.user.uid), {
                      settings: { language: savedLang }
                  }, { merge: true }).catch((e) => {
                      console.error("Error saving language preference:", e);
                  });
                  await navigateAfterLogin(userCredential.user);
              })
              .catch((error) => {
                  if (error && error.code === 'auth/invalid-email') {
                      errorMessage.textContent = tAuth('err_invalid_email');
                  } else if (error && error.code === 'auth/too-many-requests') {
                      errorMessage.textContent = tAuth('err_too_many_requests');
                  } else {
                      errorMessage.textContent = tAuth('err_login_invalid');
                  }
              });
      };

      [loginBtn, forgotPasswordLink, signUpLink].forEach((element) => {
          if (!element) return;
          element.addEventListener('pointerdown', () => animatePress(element));
          element.addEventListener('keydown', (event) => {
              if (event.key !== 'Enter' && event.key !== ' ') return;
              animatePress(element);
          });
      });

      loginBtn.addEventListener('click', () => {
          handleLogin();
      });
      [emailInput, passwordInput].forEach((inputEl) => {
          if (!inputEl) return;
          inputEl.addEventListener('keydown', (event) => {
              if (event.key !== 'Enter') return;
              event.preventDefault();
              animatePress(loginBtn);
              handleLogin();
          });
      });

      const langSelect = document.getElementById('authLanguageSelect');
      const setupAuthLangDropdown = (selectEl) => {
          const dropdown = document.getElementById('authLangDropdown');
          const button = document.getElementById('authLangButton');
          const menu = document.getElementById('authLangMenu');
          if (!selectEl || !dropdown || !button || !menu) return;
          const syncLabel = () => {
              const selected = selectEl.options[selectEl.selectedIndex];
              button.textContent = selected ? selected.textContent : 'Language';
          };
          menu.innerHTML = '';
          Array.from(selectEl.options).forEach((opt) => {
              const optionBtn = document.createElement('button');
              optionBtn.type = 'button';
              optionBtn.className = 'auth-lang-option';
              optionBtn.textContent = opt.textContent;
              optionBtn.dataset.value = opt.value;
              optionBtn.addEventListener('click', () => {
                  selectEl.value = opt.value;
                  selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                  setOpen(false);
              });
              menu.appendChild(optionBtn);
          });
          const setOpen = (isOpen) => {
              dropdown.classList.toggle('open', isOpen);
              button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          };
          button.addEventListener('click', () => setOpen(!dropdown.classList.contains('open')));
          document.addEventListener('click', (event) => {
              if (!dropdown.contains(event.target)) setOpen(false);
          });
          selectEl.addEventListener('change', syncLabel);
          syncLabel();
      };
      const savedLang = localStorage.getItem('benchmark_language') || 'en';
      if(langSelect) {
          langSelect.value = savedLang;
          setupAuthLangDropdown(langSelect);
          if (window.applyAuthTranslations) window.applyAuthTranslations('login');
          langSelect.addEventListener('change', function() {
              localStorage.setItem('benchmark_language', this.value);
              if (window.applyAuthTranslations) window.applyAuthTranslations('login');
          });
      } else if (window.applyAuthTranslations) {
          window.applyAuthTranslations('login');
      }

      const alignMobileTitleBetweenTopAndBox = () => {
          const title = document.querySelector('.app-title');
          const box = document.querySelector('.login-container');
          if (!title || !box) return;

          if (!window.matchMedia('(max-width: 900px)').matches) {
              title.style.removeProperty('transform');
              return;
          }

          // Move title visually only; do not affect box layout.
          title.style.setProperty('transform', 'none', 'important');
          const titleRect = title.getBoundingClientRect();
          const boxRect = box.getBoundingClientRect();
          const desiredTop = Math.max(4, (boxRect.top - titleRect.height) / 2);
          const deltaY = Math.round(desiredTop - titleRect.top);
          title.style.setProperty('transform', `translateY(${deltaY}px)`, 'important');
      };

      window.addEventListener('resize', alignMobileTitleBetweenTopAndBox);
      window.addEventListener('orientationchange', alignMobileTitleBetweenTopAndBox);
      requestAnimationFrame(() => {
          alignMobileTitleBetweenTopAndBox();
          setTimeout(alignMobileTitleBetweenTopAndBox, 100);
      });

      onAuthStateChanged(auth, async (user) => {
          if (!user) return;
          if (!user.emailVerified) return;
          if (!isCanonicalLoginPath(window.location.pathname || '')) return;
          await navigateAfterLogin(user);
      });

    </script>
</body>
</html>
