<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - Benchmark</title>
    <link rel="icon" type="image/png" href="../icons/baddy.png">
    <script src="mobileViewportGuard.js?v=20260310-mobile-keyboard-scope-fix-2"></script>
    <link rel="stylesheet" href="login.css?v=20260310-auth-mobile-keyboard-lock-1">
</head>
<body>
    <h1 class="app-title">Benchmark</h1>
    <div class="auth-main">
    <div class="login-container">
        <h2 data-auth-i18n="login_heading">Login</h2>
        <div class="input-group">
            <label for="email" data-auth-i18n="label_email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group">
            <label for="password" data-auth-i18n="label_password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px;">
            <input type="checkbox" id="rememberMe" style="width: auto;">
            <label for="rememberMe" style="margin: 0; cursor: pointer;" data-auth-i18n="label_remember_me">Remember me</label>
        </div>
        <button id="loginBtn" class="btn btn-primary" data-auth-i18n="btn_login">Login</button>
        <div class="alternative-actions">
            <a href="forgot-password" id="forgotPasswordLink" data-auth-i18n="link_forgot_password">Forgot Password?</a>
            <span>|</span>
            <a href="sign-up" id="signUpLink" data-auth-i18n="link_sign_up">Sign Up</a>
        </div>
        <p id="error-message" class="error-message"></p>
    </div>
    <div class="auth-lang-shell">
        <div class="auth-lang-dropdown" id="authLangDropdown">
            <button type="button" class="auth-lang-button" id="authLangButton" aria-expanded="false">Language</button>
            <div class="auth-lang-menu" id="authLangMenu"></div>
        </div>
    </div>
    </div>
    <script src="auth-footer-loader.js"></script>
    <script type="module" src="auth-i18n.js?v=20260309-auth-lang-dropdown-mobile-2"></script>
    <script type="module" src="footer-baddy.js"></script>
    <script type="module" src="loginUI.js?v=20260310-auth-mobile-stability-1"></script>
</body>
</html>
