<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sign Up - Benchmark</title>
    <link rel="icon" type="image/png" href="../../icons/baddy.png">
    <script src="../mobileViewportGuard.js?v=20260310-auth-mobile-viewport-fit-2"></script>
    <link rel="stylesheet" href="../login.css?v=20260310-auth-mobile-center-1">
</head>
<body>
    <h1 class="app-title">Benchmark</h1>
    <div class="auth-main">
    <div class="login-container">
        <h2 data-auth-i18n="signup_heading">Sign Up</h2>
        <div class="input-group">
            <label for="email" data-auth-i18n="label_email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group">
            <label for="password" data-auth-i18n="label_password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="input-group">
            <label for="confirmPassword" data-auth-i18n="label_confirm_password">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <button id="signupBtn" class="btn btn-primary" data-auth-i18n="btn_signup">Sign Up</button>
        <div class="alternative-actions">
            <span data-auth-i18n="text_already_have_account">Already have an account?</span>
            <a href="../" id="goToLoginLink" data-auth-i18n="link_login">Login</a>
        </div>
        <p id="error-message" class="error-message"></p>
    </div>
    <div class="auth-lang-shell">
        <div class="auth-lang-dropdown" id="authLangDropdown">
            <button type="button" class="auth-lang-button" id="authLangButton" aria-expanded="false">Language</button>
            <div class="auth-lang-menu" id="authLangMenu"></div>
        </div>
    </div>
    </div>
    <script src="../auth-footer-loader.js"></script>
    <script type="module" src="../auth-i18n.js?v=20260309-auth-lang-dropdown-mobile-2"></script>
    <script type="module" src="../footer-baddy.js"></script>
    <script type="module" src="./signUpUI.js"></script>
</body>
</html>
